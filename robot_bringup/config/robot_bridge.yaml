  direction: GZ_TO_ROS

- ros_topic_name: "/lidar/data"
  gz_topic_name: "/lidar/data"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

